<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creator Profile - Beat Vault</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="topbar" id="userBar" hidden>
        <p class="meta" id="userLabel"></p>
        <div class="actions">
          <a class="link-btn" href="/index.html">Back to Beat Vault</a>
          <button type="button" class="logout-btn" id="logoutBtn">Log out</button>
        </div>
      </div>

      <section class="card">
        <div class="profile-header">
          <h1 id="profileTitle">Profile</h1>
          <p class="meta" id="profileSubtitle">Loading profile...</p>
        </div>
        <div class="profile-stats" id="profileStats"></div>
      </section>

      <section class="card">
        <h2>Beats</h2>
        <div id="profileBeatsList" class="beats-list"></div>
      </section>
    </main>

    <script src="/profile.js"></script>
  </body>
</html>
