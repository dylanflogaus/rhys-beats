<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Beat Vault</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Beat Vault</h1>
        <p>Create an account. Your beats stay private to you.</p>
      </header>

      <section class="card">
        <h2>Register</h2>
        <form id="registerForm">
          <label>
            Username
            <input
              type="text"
              name="username"
              autocomplete="username"
              required
              minlength="3"
              maxlength="32"
              pattern="[a-zA-Z0-9_]{3,32}"
              title="Letters, numbers, underscores only"
            />
          </label>
          <label>
            Password
            <input type="password" name="password" autocomplete="new-password" required minlength="8" />
          </label>
          <label>
            Confirm password
            <input type="password" name="confirm" autocomplete="new-password" required minlength="8" />
          </label>
          <button type="submit">Create account</button>
          <p id="formMessage" class="message"></p>
        </form>
        <p class="meta">Already have an account? <a href="/login.html">Sign in</a>.</p>
      </section>
    </main>
    <script src="register.js"></script>
  </body>
</html>
