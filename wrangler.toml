# Git-based Pages: clear any “Deploy command” that runs `wrangler deploy`. Use Git publish only, or `wrangler pages deploy public`.
name = "rhys-beats"
compatibility_date = "2026-04-08"
pages_build_output_dir = "public"

[[d1_databases]]
binding = "DB"
database_name = "rhys-beats"
# Replace with: npx wrangler d1 create rhys-beats
database_id = "b3a82d24-c0d0-420e-ab9c-0ee4a1d07782"

[[kv_namespaces]]
binding = "BEATS_KV"
# Replace with: npx wrangler kv namespace create beat-vault-audio
id = "f4243f4f0d444edc922ccfce034678ff"
# Replace with: npx wrangler kv namespace create beat-vault-audio --preview
preview_id = "ebfa9a4a0e574f569fb0178620280ae2"
